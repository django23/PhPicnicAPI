name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist

      - name: Coding standard
        run: composer cs

      - name: Static analysis
        run: composer stan

      - name: Tests
        run: composer test
